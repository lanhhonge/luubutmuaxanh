<!DOCTYPE html>
<head lang="vi"> 
    <title> Lưu bút mùa xanh</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="luubutmuaxanh.css">
</head>

<body>
    <img id="tieude" src="tiêu đề.png" alt="">
    <div class="cautho">
        <div class="giay">
            <img src="giấy .png" alt="giay">
            <img src="giấy .png" alt="giay">
        </div>
        
        <img id="hoa" src="hoa.webp" alt="hoa">
        <img id="mayanh" src="máy ảnh nè.webp" alt="máy ảnh">
        <pre id="tho">
            Tiếc thay chút nghĩa cũ càng
            Dẫu lìa ngó ý, còn vương tơ lòng 
        </pre>
    </div>

    <div class="tamthu">
            <img src="tâm thư.png" alt="tamthu">
            <img src="tâm thư.png" alt="tamthu">
    </div>

    <div class="yourname">
        <div class="daixanh">
            <img src="dải xanh.png" alt="">
        </div>
        <img id="nenform" src="nền form.png" alt="nenform">  
        <p> (dùng tên ẩn danh cũng hong sao nha)</p>
    </div>

    <form id="ten-nguoi-gui" name="ten-nguoi-gui" data-netlify="true" method="POST">
                <input type="hidden" name="form-name" value="ten-nguoi-gui" id="">
                <span> Tên của bạn là? </span>
                <input type="text" name="ten" >
                <textarea name="Doiloinhannhu" id=""></textarea>
                <button type="submit"> Xong rùi ó </button> 

    </form>

    <div class="khutamtinh"> 
        <span> Đôi lời nhắn nhủ</span>   
        <img id= "giayviettay" src="giấy viết tay .png" alt="giayviettay">
        <img id="chimphai" src="chim phải (1).png" alt="">
        <img id="chimtrai" src="chim trái (1).png" alt="">
        <img id="buihoa" src="bụi hoa.png" alt="">
        <img id="cau" src="cầu (1).png" alt="">
        <img id="thoket" src="thơ xuân quỳnh.png" alt="">
        <span id="ket"> Cảm ơn bạn và hẹn ngày gặp lại!</span> 
    </div>
    <script>
document.querySelectorAll('form').forEach(form => {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    try {
      await fetch('https://script.google.com/macros/s/AKfycbw_Og724ejTE8UYhgkAYSO3peD0ZoHB8TLAWpSY3Jf_LGPPWOlFl9pnqrPiPslDkodnAw/exec', {
  method: 'POST',
  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
  body: new URLSearchParams({
    ten: form.querySelector('[name="ten"]').value,
    loinhannhu: form.querySelector('[name="Doiloinhannhu"]').value
  }).toString()
});

      alert('Lá thư này đã được gửi đi! 📮');
      form.reset();

    } catch (err) {
      alert('Hông được rùiiii, mình làm lại lần nữa nhaa!');
    }
  });
});
</script>
</body>
